services:
  - type: web
    name: skillswap-backend
    env: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: SEED_SECRET
        value: skillswap2024
      - key: DATABASE_URL
        fromDatabase:
          name: skillswap-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: https://skillswap-seven-sigma.vercel.app

databases:
  - name: skillswap-db
    databaseName: skillexchange
    user: skillswap
    region: singapore
    plan: free
